name: RDP

on:
  workflow_dispatch:

env:
  RDP_PASSWORD: "Winaryo321!"
  RDP_USERNAME: "runneradmin"

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Set Password RDP
        run: |
          Set-LocalUser -Name "${{ env.RDP_USERNAME }}" -Password (ConvertTo-SecureString "${{ env.RDP_PASSWORD }}" -AsPlainText -Force)
          Write-Output "[OK] Password berhasil diset"
        shell: powershell

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          Write-Output "[OK] RDP Enabled"
        shell: powershell

      - name: Install Tailscale
        run: |
          Write-Output "[1] Downloading Tailscale..."
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe"
          $output = "C:\tailscale-setup.exe"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          (New-Object System.Net.WebClient).DownloadFile($url, $output)
          Write-Output "[2] Download selesai"

          Write-Output "[3] Installing Tailscale..."
          Start-Process -FilePath $output -ArgumentList "/install /quiet" -Wait -NoNewWindow
          Write-Output "[4] Install selesai"

          Write-Output "[5] Menunggu service Tailscale..."
          Start-Sleep -Seconds 15

          $service = Get-Service -Name "Tailscale" -ErrorAction SilentlyContinue
          if ($service) {
            Write-Output "[OK] Tailscale service: $($service.Status)"
            if ($service.Status -ne "Running") {
              Start-Service -Name "Tailscale"
              Start-Sleep -Seconds 5
            }
          }

          if (Test-Path "C:\Program Files\Tailscale\tailscale.exe") {
            Write-Output "[OK] Tailscale terinstall"
          } else {
            Write-Output "[ERROR] Tailscale tidak ditemukan!"
            exit 1
          }
        shell: powershell

      - name: Connect Tailscale
        run: |
          $authkey = "${{ secrets.TAILSCALE_AUTHKEY }}"

          if ([string]::IsNullOrEmpty($authkey)) {
            Write-Output "[ERROR] TAILSCALE_AUTHKEY secret kosong!"
            Write-Output "Buka: Repository - Settings - Secrets - Actions"
            Write-Output "Tambahkan secret: TAILSCALE_AUTHKEY"
            exit 1
          }

          Write-Output "[1] Connecting Tailscale..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$authkey --hostname=github-rdp

          Start-Sleep -Seconds 10

          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4

          if ([string]::IsNullOrEmpty($ip)) {
            Write-Output "[ERROR] Gagal dapat IP Tailscale!"
            & "C:\Program Files\Tailscale\tailscale.exe" status
            exit 1
          }

          Write-Output ""
          Write-Output "========================================="
          Write-Output "         RDP SIAP DIGUNAKAN!             "
          Write-Output "========================================="
          Write-Output ""
          Write-Output "  IP Tailscale : $ip"
          Write-Output "  Username     : ${{ env.RDP_USERNAME }}"
          Write-Output "  Password     : ${{ env.RDP_PASSWORD }}"
          Write-Output "  Port         : 3389"
          Write-Output ""
          Write-Output "========================================="
          Write-Output "  KONEK DARI HP:                         "
          Write-Output "  PC Name : IP_PUBLIK_VPS:9999           "
          Write-Output "  User    : ${{ env.RDP_USERNAME }}"
          Write-Output "  Pass    : ${{ env.RDP_PASSWORD }}"
          Write-Output "========================================="
        shell: powershell

      - name: Keep Alive 6 Jam
        run: |
          Write-Output "RDP aktif selama 6 jam..."
          Write-Output "JANGAN CANCEL workflow ini!"

          $timeout = 360
          $elapsed = 0

          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds 60
            $elapsed++
            $remaining = $timeout - $elapsed

            if ($remaining % 30 -eq 0) {
              Write-Output "Sisa waktu: $remaining menit"
            }
          }
        shell: powershell
